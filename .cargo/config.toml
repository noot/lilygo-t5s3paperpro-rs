[target.xtensa-esp32s3-none-elf]
runner = "espflash flash --monitor --chip esp32s3"


[env]
# keep app logs at debug, but silence embedded-sdmmc's per-block read spam that
# otherwise floods the serial port (and slows transfers) during SD card reads
ESP_LOG = "debug,embedded_sdmmc=warn"

[build]
rustflags = [
    "-C", "link-arg=-nostartfiles",
]

target = "xtensa-esp32s3-none-elf"

[unstable]
build-std = ["core", "alloc"]

[profile.release]
debug = true
